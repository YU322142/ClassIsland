name: Build ClassIsland for LoongArch

on:
  push:
    branches: [ "master", "main", "dev" ]
  workflow_dispatch:
    inputs:
      version_tag:
        description: '手动指定版本号 (例如 2.0.4.0000)，留空则基于历史自动+1'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: 补丁 0 - 动态计算版本号并自动递增
      run: |
        git config user.email "actions@github.com"
        git config user.name "GitHub Actions"
        
        git fetch --tags https://github.com/ClassIsland/ClassIsland.git || true
        
        VERSION_TAG="${{ github.event.inputs.version_tag }}"
        
        if [ -z "$VERSION_TAG" ]; then
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "2.0.3.0000")
          echo "读取到上一次的版本号: $LATEST_TAG"
          
          IFS='.' read -r v1 v2 v3 v4 <<< "$LATEST_TAG"
          v1=${v1:-2}; v2=${v2:-0}; v3=${v3:-3}; v4=${v4:-0}
          
          v4=$(echo "$v4" | sed 's/[^0-9]*//g')
          NEXT_V4=$((10#$v4 + 1))
          NEXT_V4_PADDED=$(printf "%04d" $NEXT_V4)
          VERSION_TAG="$v1.$v2.$v3.$NEXT_V4_PADDED"
        fi
        
        echo "当前构建版本号被设定为: $VERSION_TAG"
        git tag -f "$VERSION_TAG"
        git push origin "$VERSION_TAG" --force

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: 补丁 1 - 降级 SDK 到 .NET 8
      run: |
        cat > global.json << 'EOF'
        {
          "sdk": {
            "version": "8.0.0",
            "rollForward": "latestFeature",
            "allowPrerelease": true
          }
        }
        EOF

    - name: 补丁 2 - 修复子模块 EdgeTtsSharp
      run: |
        sed -i 's/<LangVersion>13<\/LangVersion>/<LangVersion>preview<\/LangVersion>/g' vendors/EdgeTtsSharp/Edge_tts_sharp/Edge_tts_sharp.csproj
        sed -i 's/<LangVersion>latest<\/LangVersion>/<LangVersion>preview<\/LangVersion>/g' vendors/EdgeTtsSharp/Edge_tts_sharp/Edge_tts_sharp.csproj

    - name: 补丁 3 - 动态生成 Secrets 占位文件
      run: |
        cat > ClassIsland/secrets.g.cs << 'EOF'
        namespace ClassIsland.Services.SpeechService { 
            public static partial class GptSovitsSecrets {
                public const string PrivateKey = "";
                public const string PrivateKeyPassPhrase = "";
                public const bool IsSecretsFilled = false;
            }
        }
        EOF

    - name: 补丁 4 - 动态重写 AudioService 支持龙芯 Linux 播放器
      run: |
        # 1. 拦截 MiniAudioEngine 初始化
        sed -i 's/Task.Run((() => new MiniAudioEngine())).Result;/null; \/\/ MiniAudio Disabled on LoongArch/g' ClassIsland/Services/AudioService.cs
        
        # 2. 移除原版抛出 PlatformNotSupportedException 的逻辑
        sed -i '/throw new PlatformNotSupportedException/d' ClassIsland/Services/AudioService.cs
        
        # 3. 拦截 TryInitializeDefaultPlaybackDeviceInternal()
        sed -i 's/var deviceInfo = AudioEngine.PlaybackDevices/if (_audioEngine == null) return null; var deviceInfo = AudioEngine.PlaybackDevices/g' ClassIsland/Services/AudioService.cs
        
        # 4. 彻底接管 PlayAudioAsync 逻辑，引入 ffplay 方案
        # 寻找 public async Task PlayAudioAsync(string filePath... 这行作为注入点
        sed -i '/public async Task PlayAudioAsync(string filePath/i \
        private async Task PlayStreamViaSystemAsync(Stream audio, float volume) {\
            string playerName = "ffplay";\
            var tempFile = Path.Combine(Path.GetTempPath(), $"ci_audio_{Guid.NewGuid():N}.wav");\
            try { using (var fs = File.Create(tempFile)) { await audio.CopyToAsync(fs); } await RunPlayerAsync(playerName, tempFile, volume); }\
            finally { try { File.Delete(tempFile); } catch { } }\
        }\
        private async Task RunPlayerAsync(string playerName, string filePath, float volume) {\
            var args = $"-nodisp -autoexit -volume {(int)(volume * 100)} \"{filePath}\"";\
            var psi = new System.Diagnostics.ProcessStartInfo { FileName = playerName, Arguments = args, UseShellExecute = false, CreateNoWindow = true, RedirectStandardOutput = true, RedirectStandardError = true };\
            using var process = System.Diagnostics.Process.Start(psi);\
            if (process != null) { await process.WaitForExitAsync(); }\
        }\
        ' ClassIsland/Services/AudioService.cs
        
        # 5. 修改原有的 PlayAudioAsync(Stream...) 使其在 _audioEngine 为空时调用我们写好的系统播放器
        sed -i 's/cancellationToken ??= CancellationToken.None;/cancellationToken ??= CancellationToken.None; if (_audioEngine == null) { await PlayStreamViaSystemAsync(audio, volume); return; }/g' ClassIsland/Services/AudioService.cs
        
        # 6. 修改原有的 PlayAudioAsync(string...) 使其在 _audioEngine 为空时调用我们写好的系统播放器
        sed -i '/using var audio = File.OpenRead(filePath);/i \
        if (_audioEngine == null && !System.Runtime.InteropServices.RuntimeInformation.IsOSPlatform(System.Runtime.InteropServices.OSPlatform.Windows)) { await RunPlayerAsync("ffplay", filePath, volume); return; }' ClassIsland/Services/AudioService.cs

    - name: 补丁 5 - 动态拦截重启退出逻辑
      run: |
        sed -i 's/Environment.ProcessPath/"bash"/g' ClassIsland.Core/AppBase.cs
        sed -i 's/FileName = "bash"/FileName = "bash", Arguments = "..\/run.sh --foreground"/g' ClassIsland.Core/AppBase.cs

    - name: 编译发布 ClassIsland
      run: |
        dotnet publish ClassIsland.Desktop/ClassIsland.Desktop.csproj \
          -c Release \
          --no-self-contained \
          -p:PublishDir=../output/ClassIsland \
          -p:PublishBuilding=true \
          -p:PublishPlatform=linux \
          -p:Platforms_Linux=true \
          -p:TrimAssets=false \
          "-p:ClassIsland_PlatformTarget=Any CPU"

    - name: 注入原生库和 .NET 运行时
      run: |
        mkdir -p output/ClassIsland/runtimes/linux-loongarch64/native/
        if [ -d "LoongArch-NativeLibs" ]; then
            cp LoongArch-NativeLibs/*.so output/ClassIsland/runtimes/linux-loongarch64/native/ 2>/dev/null || true
            chmod +rx output/ClassIsland/runtimes/linux-loongarch64/native/*.so 2>/dev/null || true
        fi
        
        mkdir -p output/dotnet-runtime
        if [ -d "LoongArch-Runtime" ]; then
            tar -xf LoongArch-Runtime/dotnet-runtime-*.tar* -C output/dotnet-runtime/ 2>/dev/null || true
            chmod +x output/dotnet-runtime/dotnet 2>/dev/null || true
        fi

    - name: 创建一键启动脚本
      run: |
        cat > output/run.sh << 'SCRIPT'
        #!/bin/bash
        SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
        APP_DIR="$SCRIPT_DIR/ClassIsland"
        
        export DOTNET_ROOT="$SCRIPT_DIR/dotnet-runtime"
        DOTNET="$DOTNET_ROOT/dotnet"
        
        export PATH="$DOTNET_ROOT:$PATH:/usr/bin:/usr/local/bin"
        export DOTNET_CLI_TELEMETRY_OPTOUT=1
        
        export DISPLAY=${DISPLAY:-:0}
        export XAUTHORITY=${XAUTHORITY:-$HOME/.Xauthority}
        export DBUS_SESSION_BUS_ADDRESS=${DBUS_SESSION_BUS_ADDRESS:-unix:path=/run/user/$(id -u)/bus}
        export XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR:-/run/user/$(id -u)}
        export XDG_DATA_DIRS=${XDG_DATA_DIRS:-/usr/share:/usr/local/share}
        
        [ ! -e "$SCRIPT_DIR/dotnet-runtime/Assets" ] && ln -sf "$APP_DIR/Assets" "$SCRIPT_DIR/dotnet-runtime/Assets"
        [ ! -e "$SCRIPT_DIR/dotnet-runtime/Config" ] && ln -sf "$APP_DIR/Config" "$SCRIPT_DIR/dotnet-runtime/Config"
        
        cd "$APP_DIR"
        mkdir -p "$SCRIPT_DIR/logs"
        
        if [ "$1" = "--foreground" ]; then
            exec "$DOTNET" ClassIsland.Desktop.dll
        else
            nohup "$DOTNET" ClassIsland.Desktop.dll "$@" > "$SCRIPT_DIR/logs/classisland.log" 2>&1 & disown
            echo "✅ ClassIsland 已在后台启动，日志位于 logs/classisland.log"
        fi
        SCRIPT
        chmod +x output/run.sh

    - name: 打包为独立归档文件
      run: |
        cd output
        tar -czvf ../ClassIsland-LoongArch.tar.gz .

    - name: 上传 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ClassIsland-LoongArch-OldWorld
        path: ClassIsland-LoongArch.tar.gz
