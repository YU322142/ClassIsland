name: Build ClassIsland for LoongArch

on:
  push:
    branches: [ "master", "main", "dev" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0     # 必须为0，获取完整历史和 Tags 供版本号生成

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: 补丁 1 - 降级 SDK 到 .NET 8
      run: |
        cat > global.json << 'EOF'
        {
          "sdk": {
            "version": "8.0.0",
            "rollForward": "latestFeature",
            "allowPrerelease": true
          }
        }
        EOF

    - name: 补丁 2 - 修复子模块 EdgeTtsSharp
      run: |
        sed -i 's/<LangVersion>13<\/LangVersion>/<LangVersion>preview<\/LangVersion>/g' vendors/EdgeTtsSharp/Edge_tts_sharp/Edge_tts_sharp.csproj
        sed -i 's/<LangVersion>latest<\/LangVersion>/<LangVersion>preview<\/LangVersion>/g' vendors/EdgeTtsSharp/Edge_tts_sharp/Edge_tts_sharp.csproj

    - name: 补丁 3 - 生成占位 Secrets
      run: |
        cat > ClassIsland/secrets.g.cs << 'EOF'
        namespace ClassIsland.Services.SpeechService { 
            public static partial class GptSovitsSecrets {
                public const string PrivateKey = "";
                public const string PrivateKeyPassPhrase = "";
                public const bool IsSecretsFilled = false;
            }
        }
        EOF

    - name: 编译 ClassIsland
      run: |
        dotnet publish ClassIsland.Desktop/ClassIsland.Desktop.csproj \
          -c Release \
          --no-self-contained \
          -p:PublishDir=../output/ClassIsland \
          -p:PublishBuilding=true \
          -p:PublishPlatform=linux \
          -p:Platforms_Linux=true \
          -p:TrimAssets=false \
          "-p:ClassIsland_PlatformTarget=Any CPU"

    - name: 注入原生库和 .NET 运行时
      run: |
        # 1. 注入原生库
        mkdir -p output/ClassIsland/runtimes/linux-loongarch64/native/
        cp LoongArch-NativeLibs/libSkiaSharp.so output/ClassIsland/runtimes/linux-loongarch64/native/
        cp LoongArch-NativeLibs/libHarfBuzzSharp.so output/ClassIsland/runtimes/linux-loongarch64/native/
        chmod +rx output/ClassIsland/runtimes/linux-loongarch64/native/*.so

        # 2. 直接将运行时解压到 ClassIsland 目录！(完美解决各种路径错误)
        tar -xf LoongArch-Runtime/dotnet-runtime-*.tar* -C output/ClassIsland/
        chmod +x output/ClassIsland/dotnet

    - name: 创建一键启动脚本
      run: |
        cat > output/run.sh << 'SCRIPT'
        #!/bin/bash
        SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
        APP_DIR="$SCRIPT_DIR/ClassIsland"
        
        export DOTNET_ROOT="$APP_DIR"
        export PATH="$DOTNET_ROOT:$PATH:/usr/bin:/usr/local/bin"
        export DOTNET_CLI_TELEMETRY_OPTOUT=1
        
        export DISPLAY=${DISPLAY:-:0}
        export XAUTHORITY=${XAUTHORITY:-$HOME/.Xauthority}
        export DBUS_SESSION_BUS_ADDRESS=${DBUS_SESSION_BUS_ADDRESS:-unix:path=/run/user/$(id -u)/bus}
        export XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR:-/run/user/$(id -u)}
        export XDG_DATA_DIRS=${XDG_DATA_DIRS:-/usr/share:/usr/local/share}
        
        cd "$APP_DIR"
        mkdir -p "$SCRIPT_DIR/logs"
        nohup ./dotnet ClassIsland.Desktop.dll "$@" > "$SCRIPT_DIR/logs/classisland.log" 2>&1 & disown
        echo "✅ ClassIsland 已在后台启动，日志位于 logs/classisland.log"
        SCRIPT
        chmod +x output/run.sh

    - name: 打包成 tar.gz
      run: |
        cd output
        tar -czvf ../ClassIsland-LoongArch.tar.gz .

    - name: 上传 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ClassIsland-LoongArch-OldWorld
        path: ClassIsland-LoongArch.tar.gz
